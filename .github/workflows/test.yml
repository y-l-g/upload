name: Test

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  native:
    name: Native module tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'

      - name: Verify Go version
        run: test "$(go version | awk '{print $3}')" = "go1.26.3"

      - name: Run native tests
        working-directory: module
        run: |
          GO_ROOT="$(go env GOROOT)"
          test -n "$GO_ROOT"
          docker run --rm \
            -v "$PWD:/module" \
            -v "$GO_ROOT:$GO_ROOT:ro" \
            -w /module \
            -e "GOROOT=$GO_ROOT" \
            -e CGO_ENABLED=1 \
            -e GOTOOLCHAIN=local \
            dunglas/frankenphp:1.12.3-builder-php8.5.6-trixie \
            sh -lc 'export PATH="$GOROOT/bin:$PATH" && \
              test "$(go version | awk '"'"'{print $3}'"'"')" = "go1.26.3" && \
              CGO_CFLAGS="-D_GNU_SOURCE -g -O0 $(php-config --includes)" \
              CGO_CPPFLAGS="$(php-config --includes)" \
              CGO_LDFLAGS="$(php-config --ldflags) $(php-config --libs)" \
              go test -count=1 -tags=nobadger,nomysql,nopgx,nowatcher -mod=readonly ./...'
